name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ───────────────────────────────────────────────
  # 1. Lint
  # ───────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js kurulum
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Lint
        run: npm run lint

  # ───────────────────────────────────────────────
  # 2. Birim Testler (Vitest)
  # ───────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js kurulum
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Prisma client oluştur
        run: npx prisma generate

      - name: Testleri çalıştır
        run: npm test
        env:
          # Birim testler için DB bağlantısı gerekmez ama env yüklenmeli
          DATABASE_URL: "postgresql://noop:noop@localhost:5432/noop"
          NEXTAUTH_SECRET: "ci-test-secret-min-32-chars-1234"
          NEXTAUTH_URL: "http://localhost:3000"

  # ───────────────────────────────────────────────
  # 3. Build Kontrolü (Next.js)
  # ───────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Node.js kurulum
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Prisma client oluştur
        run: npx prisma generate

      - name: Production build
        run: npx next build
        env:
          DATABASE_URL: "postgresql://noop:noop@localhost:5432/noop"
          NEXTAUTH_SECRET: "ci-test-secret-min-32-chars-1234"
          NEXTAUTH_URL: "http://localhost:3000"
          SKIP_ENV_VALIDATION: "1"

      - name: Build artifact boyutunu raporla
        run: |
          echo "=== .next/standalone boyutu ==="
          du -sh .next || true
